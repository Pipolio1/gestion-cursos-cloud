services:
  oracle:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: Oracle123
    volumes:
      - oracle-data:/opt/oracle/oradata
    networks:
      - gestion-cursos-network
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - gestion-cursos-network
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  gestion-cursos-cloud:
    image: pipolio/gestion-cursos-cloud:latest
    container_name: gestion-cursos-cloud
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASSWORD=guest
      - ORACLE_HOST=oracle
      - ORACLE_PORT=1521
      - ORACLE_DB=XE
      - ORACLE_USER=system
      - ORACLE_PASSWORD=Oracle123
      - JPA_DDL_AUTO=update
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AZURE_B2C_ISSUER_URI=${AZURE_B2C_ISSUER_URI}
      - AZURE_B2C_JWK_SET_URI=${AZURE_B2C_JWK_SET_URI}
    depends_on:
      oracle:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - gestion-cursos-network
    restart: unless-stopped

networks:
  gestion-cursos-network:
    driver: bridge

volumes:
  oracle-data:
