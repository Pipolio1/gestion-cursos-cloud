services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - gestion-cursos-network
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    restart: unless-stopped

  gestion-cursos-cloud:
    image: pipolio/gestion-cursos-cloud:latest
    container_name: gestion-cursos-cloud
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - TNS_ADMIN=/app/wallet
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASSWORD=guest
      - ORACLE_TNS_NAME=inscripcionescursoss7_high
      - ORACLE_TNS_ADMIN=/app/wallet
      - ORACLE_USER=ADMIN2
      - ORACLE_PASSWORD=GestionCursos2024!
      - JPA_DDL_AUTO=update
      - JAVA_OPTS=-Xms128m -Xmx512m -XX:MaxRAMPercentage=70.0 -Djava.security.egd=file:/dev/./urandom
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN}
      - AZURE_B2C_ISSUER_URI=${AZURE_B2C_ISSUER_URI}
      - AZURE_B2C_JWK_SET_URI=${AZURE_B2C_JWK_SET_URI}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - gestion-cursos-network
    mem_limit: 768m
    pull_policy: always
    restart: unless-stopped

  kong:
    image: kong:3.7
    container_name: kong
    ports:
      - "8000:8000"
      - "8001:8001"
    environment:
      - KONG_DATABASE=off
      - KONG_DECLARATIVE_CONFIG=/kong/declarative/kong.yml
      - KONG_PROXY_ACCESS_LOG=/dev/stdout
      - KONG_ADMIN_ACCESS_LOG=/dev/stdout
      - KONG_PROXY_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_ERROR_LOG=/dev/stderr
      - KONG_PLUGINS=bundled
    volumes:
      - ./kong.yml:/kong/declarative/kong.yml:ro
    depends_on:
      - gestion-cursos-cloud
    networks:
      - gestion-cursos-network
    mem_limit: 512m
    restart: unless-stopped

networks:
  gestion-cursos-network:
    driver: bridge
