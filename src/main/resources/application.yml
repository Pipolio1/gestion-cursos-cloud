spring:
  application:
    name: gestion-cursos-cloud
  datasource:
    url: jdbc:oracle:thin:@${ORACLE_TNS_NAME:inscripcionescursoss7_high}?TNS_ADMIN=${ORACLE_TNS_ADMIN:/app/wallet}
    username: ${ORACLE_USER:ADMIN}
    password: ${ORACLE_PASSWORD:}
    driver-class-name: oracle.jdbc.OracleDriver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:create-drop}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 1000
          max-attempts: 3
          max-interval: 10000
          multiplier: 2
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AZURE_B2C_ISSUER_URI:https://login.microsoftonline.com/common/v2.0}
          jwk-set-uri: ${AZURE_B2C_JWK_SET_URI:https://login.microsoftonline.com/common/discovery/v2.0/keys}

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: ${SERVER_CONTEXT_PATH:/}

aws:
  s3:
    bucket: ${AWS_S3_BUCKET:}
    region: ${AWS_REGION:us-east-1}
    access-key: ${AWS_ACCESS_KEY_ID:}
    secret-key: ${AWS_SECRET_ACCESS_KEY:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.duoc.eft.gestioncursoscloud: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
