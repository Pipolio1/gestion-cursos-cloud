_format_version: "3.0"
_transform: true

services:
  - name: gestion-cursos-cloud
    url: http://gestion-cursos-cloud:8080
    routes:
      - name: api-routes
        paths:
          - /api
          - /actuator
        strip_path: false
        preserve_host: false

  - name: rabbitmq-management
    url: http://rabbitmq:15672
    routes:
      - name: rabbitmq-routes
        paths:
          - /rabbitmq
        strip_path: true
        preserve_host: false

plugins:
  - name: rate-limiting
    config:
      minute: 60
      policy: local
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - Authorization
        - Content-Type
      exposed_headers:
        - Authorization
      max_age: 3600
